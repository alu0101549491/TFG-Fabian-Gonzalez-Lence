# Railway Configuration for CartographicProjectManager Backend
# 
# ⚠️ IMPORTANT: This repository is a MONOREPO
# The backend is located at: projects/4-CartographicProjectManager/backend
#
# PREFERRED METHOD (Recommended):
# 1. In Railway dashboard, go to your service Settings
# 2. Set "Root Directory" to: projects/4-CartographicProjectManager/backend
# 3. Set "Build Command" to: npm ci && npx prisma generate && npm run build
# 4. Set "Start Command" to: npx prisma migrate deploy && npm start
# 5. Redeploy
#
# ALTERNATIVE METHOD (If Root Directory doesn't work):
# Use the commands defined in the root package.json:
# - Build: npm run railway:build
# - Start: npm run railway:start
#
# See complete guide: projects/4-CartographicProjectManager/RAILWAY-DEPLOYMENT.md
