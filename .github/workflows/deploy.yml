name: Deploy Projects to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all projects
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          CARTO_BACKEND_URL: ${{ secrets.CARTO_BACKEND }}
          TENNIS_BACKEND_URL: ${{ secrets.TENNIS_BACKEND }}
        run: |
          mkdir -p deploy
          
          # Build 1-TheHangmanGame
          if [ -d "projects/1-TheHangmanGame" ]; then
            echo "🔨 Building 1-TheHangmanGame..."
            cd projects/1-TheHangmanGame
            npm ci
            export BASE_URL="/$REPO_NAME/1-TheHangmanGame/"
            npm run build
            mkdir -p "../../deploy/1-TheHangmanGame"
            cp -r dist/* "../../deploy/1-TheHangmanGame/"
            cd ../..
            echo "✅ 1-TheHangmanGame built successfully"
          fi
          
          # Build 2-MusicWebPlayer
          if [ -d "projects/2-MusicWebPlayer" ]; then
            echo "🔨 Building 2-MusicWebPlayer..."
            cd projects/2-MusicWebPlayer
            npm ci
            export BASE_URL="/$REPO_NAME/2-MusicWebPlayer/"
            npm run build
            mkdir -p "../../deploy/2-MusicWebPlayer"
            cp -r dist/* "../../deploy/2-MusicWebPlayer/"
            cd ../..
            echo "✅ 2-MusicWebPlayer built successfully"
          fi
          
          # Build 3-MiniBalatro
          if [ -d "projects/3-MiniBalatro" ]; then
            echo "🔨 Building 3-MiniBalatro..."
            cd projects/3-MiniBalatro
            npm ci
            export BASE_URL="/$REPO_NAME/3-MiniBalatro/"
            npm run build
            mkdir -p "../../deploy/3-MiniBalatro"
            cp -r dist/* "../../deploy/3-MiniBalatro/"
            cd ../..
            echo "✅ 3-MiniBalatro built successfully"
          fi
          
          # Build 4-CartographicProjectManager
          if [ -d "projects/4-CartographicProjectManager" ]; then
            echo "🔨 Building 4-CartographicProjectManager..."
            cd projects/4-CartographicProjectManager
            npm ci
            
            # Set production environment variables
            export BASE_URL="/$REPO_NAME/4-CartographicProjectManager/"
            export VITE_API_BASE_URL="${CARTO_BACKEND_URL:-https://carto-backend-gl8l.onrender.com}/api/v1"
            export VITE_SOCKET_URL="${CARTO_BACKEND_URL:-https://carto-backend-gl8l.onrender.com}"
            export VITE_APP_VERSION="1.0.0"
            export NODE_ENV="production"
            
            echo "📡 API URL: $VITE_API_BASE_URL"
            npm run build
            mkdir -p "../../deploy/4-CartographicProjectManager"
            cp -r dist/* "../../deploy/4-CartographicProjectManager/"
            cd ../..
            echo "✅ 4-CartographicProjectManager built successfully"
          fi
          
          # Build 5-TennisTournamentManager
          if [ -d "projects/5-TennisTournamentManager" ]; then
            echo "🔨 Building 5-TennisTournamentManager..."
            cd projects/5-TennisTournamentManager
            npm ci
            
            # Set production environment variables
            export BASE_URL="/$REPO_NAME/5-TennisTournamentManager/"
            export VITE_API_BASE_URL="${TENNIS_BACKEND_URL:-https://tennis-backend-ltkr.onrender.com}/api"
            export VITE_SOCKET_URL="${TENNIS_BACKEND_URL:-https://tennis-backend-ltkr.onrender.com}"
            export NODE_ENV="production"
            
            echo "📡 API URL: $VITE_API_BASE_URL"
            npm run build
            mkdir -p "../../deploy/5-TennisTournamentManager"
            cp -r dist/* "../../deploy/5-TennisTournamentManager/"
            cd ../..
            echo "✅ 5-TennisTournamentManager built successfully"
          fi

      - name: Create index page
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TFG Portfolio — Fabián González Lence</title>
              <style>
                  *, *::before, *::after {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }

                  :root {
                      --bg: #09090f;
                      --bg-card: #0f0f1a;
                      --border: #1c1c2e;
                      --border-hover: #7c3aed;
                      --text: #eeeeff;
                      --text-muted: #7878a0;
                      --accent: #7c3aed;
                      --accent-light: #a78bfa;
                      --accent-dim: rgba(124, 58, 237, 0.15);
                      --glow: rgba(124, 58, 237, 0.3);
                  }

                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background-color: var(--bg);
                      background-image:
                          radial-gradient(ellipse 80% 50% at 15% 0%, rgba(124,58,237,0.14) 0%, transparent 60%),
                          radial-gradient(ellipse 60% 40% at 85% 100%, rgba(109,40,217,0.10) 0%, transparent 60%);
                      min-height: 100vh;
                      color: var(--text);
                      padding: 64px 24px 80px;
                  }

                  .container {
                      max-width: 1080px;
                      margin: 0 auto;
                  }

                  /* ── Header ── */
                  .header {
                      text-align: center;
                      margin-bottom: 64px;
                  }

                  .badge {
                      display: inline-flex;
                      align-items: center;
                      gap: 8px;
                      background: var(--accent-dim);
                      border: 1px solid rgba(124,58,237,0.35);
                      color: var(--accent-light);
                      padding: 5px 16px;
                      border-radius: 100px;
                      font-size: 0.75em;
                      font-weight: 600;
                      letter-spacing: 0.08em;
                      text-transform: uppercase;
                      margin-bottom: 28px;
                  }

                  h1 {
                      font-size: clamp(1.7em, 3.5vw, 2.8em);
                      font-weight: 800;
                      line-height: 1.2;
                      letter-spacing: -0.02em;
                      margin-bottom: 18px;
                      background: linear-gradient(135deg, #f0f0ff 0%, #c4b5fd 55%, #a78bfa 100%);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      background-clip: text;
                  }

                  .subtitle {
                      color: var(--text-muted);
                      font-size: 1em;
                      line-height: 1.75;
                      max-width: 540px;
                      margin: 0 auto 28px;
                  }

                  .divider {
                      width: 48px;
                      height: 3px;
                      background: linear-gradient(90deg, var(--accent), #c084fc);
                      border-radius: 3px;
                      margin: 0 auto;
                  }

                  /* ── Grid ── */
                  .projects {
                      display: grid;
                      grid-template-columns: repeat(6, 1fr);
                      gap: 18px;
                  }

                  /* First 3 cards span 2 cols each (full row) */
                  .projects .project-card:nth-child(-n+3) {
                      grid-column: span 2;
                  }

                  /* Last 2 cards: span 2 cols each, centered (col 2-4 and 4-6) */
                  .projects .project-card:nth-child(4) {
                      grid-column: 2 / span 2;
                  }

                  .projects .project-card:nth-child(5) {
                      grid-column: 4 / span 2;
                  }

                  /* ── Card ── */
                  .project-card {
                      background: var(--bg-card);
                      border: 1px solid var(--border);
                      border-radius: 16px;
                      padding: 26px;
                      text-decoration: none;
                      color: inherit;
                      display: flex;
                      flex-direction: column;
                      gap: 12px;
                      position: relative;
                      overflow: hidden;
                      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
                  }

                  .project-card::before {
                      content: '';
                      position: absolute;
                      inset: 0;
                      background: linear-gradient(135deg, rgba(124,58,237,0.06) 0%, transparent 60%);
                      opacity: 0;
                      transition: opacity 0.3s;
                      pointer-events: none;
                  }

                  .project-card:hover {
                      border-color: var(--border-hover);
                      box-shadow:
                          0 0 0 1px rgba(124,58,237,0.2),
                          0 20px 48px rgba(0,0,0,0.55),
                          0 0 40px rgba(124,58,237,0.12);
                      transform: translateY(-5px);
                  }

                  .project-card:hover::before { opacity: 1; }

                  .card-header {
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                  }

                  .icon-wrap {
                      width: 46px;
                      height: 46px;
                      background: var(--accent-dim);
                      border: 1px solid rgba(124,58,237,0.25);
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.4em;
                      flex-shrink: 0;
                  }

                  .num {
                      font-size: 0.72em;
                      font-weight: 700;
                      color: var(--accent-light);
                      background: var(--accent-dim);
                      border: 1px solid rgba(124,58,237,0.25);
                      padding: 3px 10px;
                      border-radius: 100px;
                      letter-spacing: 0.04em;
                  }

                  .project-name {
                      font-size: 1.05em;
                      font-weight: 700;
                      color: var(--text);
                      line-height: 1.3;
                  }

                  .project-description {
                      color: var(--text-muted);
                      font-size: 0.85em;
                      line-height: 1.7;
                      flex: 1;
                  }

                  .tags {
                      display: flex;
                      flex-wrap: wrap;
                      gap: 6px;
                  }

                  .tag {
                      font-size: 0.7em;
                      font-weight: 500;
                      color: #8888bb;
                      background: rgba(255,255,255,0.04);
                      border: 1px solid rgba(255,255,255,0.08);
                      padding: 3px 9px;
                      border-radius: 6px;
                  }

                  .card-cta {
                      font-size: 0.8em;
                      color: var(--accent-light);
                      text-align: right;
                      opacity: 0;
                      transform: translateX(-6px);
                      transition: opacity 0.2s, transform 0.2s;
                  }

                  .project-card:hover .card-cta {
                      opacity: 1;
                      transform: translateX(0);
                  }

                  /* ── Footer ── */
                  .footer {
                      margin-top: 64px;
                      padding-top: 28px;
                      border-top: 1px solid var(--border);
                      text-align: center;
                  }

                  .footer p {
                      color: var(--text-muted);
                      font-size: 0.82em;
                  }

                  .footer a {
                      color: var(--accent-light);
                      text-decoration: none;
                  }

                  .footer a:hover { text-decoration: underline; }

                  /* ── Responsive ── */
                  @media (max-width: 860px) {
                      .projects {
                          grid-template-columns: repeat(4, 1fr);
                      }
                      .projects .project-card:nth-child(-n+3) {
                          grid-column: span 2;
                      }
                      .projects .project-card:nth-child(4),
                      .projects .project-card:nth-child(5) {
                          grid-column: span 2;
                      }
                  }

                  @media (max-width: 540px) {
                      body { padding: 40px 16px 60px; }
                      .projects {
                          grid-template-columns: 1fr;
                      }
                      .projects .project-card:nth-child(-n+3),
                      .projects .project-card:nth-child(4),
                      .projects .project-card:nth-child(5) {
                          grid-column: 1;
                      }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <header class="header">
                      <div class="badge">🎓 Trabajo de Fin de Grado &middot; ULL</div>
                      <h1>TFG &mdash; Análisis de Capacidades de la IA<br>en la Generación Semiautomática<br>de Aplicaciones Complejas</h1>
                      <p class="subtitle">Colección de proyectos desarrollados con asistencia de IA como parte del Trabajo de Fin de Grado en Ingeniería Informática.</p>
                      <div class="divider"></div>
                  </header>

                  <div class="projects">

                      <a href="./1-TheHangmanGame/" class="project-card">
                          <div class="card-header">
                              <div class="icon-wrap">🎮</div>
                              <span class="num">01</span>
                          </div>
                          <div class="project-name">The Hangman Game</div>
                          <div class="project-description">Juego clásico de adivinar palabras construido íntegramente con TypeScript.</div>
                          <div class="tags">
                              <span class="tag">TypeScript</span>
                              <span class="tag">Vite</span>
                              <span class="tag">Jest</span>
                              <span class="tag">HTML5</span>
                              <span class="tag">CSS3</span>
                          </div>
                          <div class="card-cta">Abrir proyecto →</div>
                      </a>

                      <a href="./2-MusicWebPlayer/" class="project-card">
                          <div class="card-header">
                              <div class="icon-wrap">🎵</div>
                              <span class="num">02</span>
                          </div>
                          <div class="project-name">Music Web Player</div>
                          <div class="project-description">Aplicación moderna de reproductor de música construida con React.</div>
                          <div class="tags">
                              <span class="tag">React</span>
                              <span class="tag">TypeScript</span>
                              <span class="tag">Vite</span>
                              <span class="tag">Jest</span>
                              <span class="tag">IndexedDB</span>
                          </div>
                          <div class="card-cta">Abrir proyecto →</div>
                      </a>

                      <a href="./3-MiniBalatro/" class="project-card">
                          <div class="card-header">
                              <div class="icon-wrap">🃏</div>
                              <span class="num">03</span>
                          </div>
                          <div class="project-name">Mini Balatro</div>
                          <div class="project-description">Juego de cartas adictivo inspirado en Balatro, desarrollado con TypeScript.</div>
                          <div class="tags">
                              <span class="tag">React</span>
                              <span class="tag">TypeScript</span>
                              <span class="tag">Vite</span>
                              <span class="tag">Jest</span>
                              <span class="tag">Canvas</span>
                          </div>
                          <div class="card-cta">Abrir proyecto →</div>
                      </a>

                      <a href="./4-CartographicProjectManager/" class="project-card">
                          <div class="card-header">
                              <div class="icon-wrap">🗺️</div>
                              <span class="num">04</span>
                          </div>
                          <div class="project-name">Cartographic Project Manager</div>
                          <div class="project-description">Gestión integral de proyectos cartográficos con colaboración en tiempo real y seguimiento de tareas.</div>
                          <div class="tags">
                              <span class="tag">Vue</span>
                              <span class="tag">TypeScript</span>
                              <span class="tag">Vite</span>
                              <span class="tag">Prisma</span>
                              <span class="tag">Supabase</span>
                              <span class="tag">Playwright</span>
                          </div>
                          <div class="card-cta">Abrir proyecto →</div>
                      </a>

                      <a href="./5-TennisTournamentManager/" class="project-card">
                          <div class="card-header">
                              <div class="icon-wrap">🎾</div>
                              <span class="num">05</span>
                          </div>
                          <div class="project-name">Tennis Tournament Manager</div>
                          <div class="project-description">Gestión completa de torneos de tenis con notificaciones en tiempo real y clasificaciones.</div>
                          <div class="tags">
                              <span class="tag">Angular</span>
                              <span class="tag">TypeScript</span>
                              <span class="tag">Vite</span>
                              <span class="tag">TypeORM</span>
                              <span class="tag">PostgreSQL</span>
                              <span class="tag">Playwright</span>
                          </div>
                          <div class="card-cta">Abrir proyecto →</div>
                      </a>

                  </div>

                  <footer class="footer">
                      <p>Desarrollado por <a href="https://github.com/alu0101549491">Fabián González Lence</a> &middot; Universidad de La Laguna &middot; 2025&ndash;2026</p>
                  </footer>
              </div>
          </body>
          </html>
          EOF

      - name: Copy root 404 page for SPA routing
        run: cp 404.html deploy/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4