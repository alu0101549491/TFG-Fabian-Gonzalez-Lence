name: E2E (CartographicProjectManager)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: cartographic_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Backend
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres@localhost:5432/cartographic_manager?schema=public
      JWT_SECRET: e2e-jwt-secret
      JWT_REFRESH_SECRET: e2e-jwt-refresh-secret
      SEED_CONFIRM: I_UNDERSTAND
      CORS_ORIGIN: http://localhost:5173
      SOCKET_CORS_ORIGIN: http://localhost:5173

      # Frontend
      BASE_URL: /4-CartographicProjectManager/
      VITE_API_BASE_URL: http://localhost:3000/api/v1
      VITE_SOCKET_URL: http://localhost:3000
      VITE_APP_VERSION: e2e-ci

      # Playwright helpers
      PLAYWRIGHT_BASE_URL: http://localhost:5173/4-CartographicProjectManager/
      PW_API_BASE_URL: http://localhost:3000/api/v1/

      # E2E account credentials (must be configured as GitHub secrets)
      PW_E2E_ADMIN_PASSWORD: ${{ secrets.PW_E2E_ADMIN_PASSWORD }}
      PW_E2E_CLIENT_PASSWORD: ${{ secrets.PW_E2E_CLIENT_PASSWORD }}
      PW_E2E_SPECIAL_PASSWORD: ${{ secrets.PW_E2E_SPECIAL_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate required secrets
        run: |
          missing=0
          for name in PW_E2E_ADMIN_PASSWORD PW_E2E_CLIENT_PASSWORD PW_E2E_SPECIAL_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Configure these secrets in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install backend dependencies
        working-directory: projects/4-CartographicProjectManager/backend
        run: npm ci

      - name: Prisma generate + migrate + seed
        working-directory: projects/4-CartographicProjectManager/backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed

      - name: Start backend
        working-directory: projects/4-CartographicProjectManager/backend
        run: |
          npm run dev > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Install frontend dependencies
        working-directory: projects/4-CartographicProjectManager
        run: npm ci

      - name: Install Playwright browsers
        working-directory: projects/4-CartographicProjectManager
        run: npx playwright install --with-deps

      - name: Start frontend
        working-directory: projects/4-CartographicProjectManager
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 --strictPort > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/v1/health >/dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            sleep 1
          done

          echo "Waiting for frontend..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5173/4-CartographicProjectManager/ >/dev/null 2>&1; then
              echo "Frontend is up"
              break
            fi
            sleep 1
          done

      - name: Run Playwright E2E (all suites)
        working-directory: projects/4-CartographicProjectManager
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: projects/4-CartographicProjectManager/playwright-report/
          retention-days: 30

      - name: Upload service logs (on failure)
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: e2e-service-logs
          path: |
            projects/4-CartographicProjectManager/backend/backend.log
            projects/4-CartographicProjectManager/frontend.log
          retention-days: 7

      - name: Stop services
        if: ${{ always() }}
        run: |
          if [ -f projects/4-CartographicProjectManager/backend/backend.pid ]; then
            kill $(cat projects/4-CartographicProjectManager/backend/backend.pid) || true
          fi
          if [ -f projects/4-CartographicProjectManager/frontend.pid ]; then
            kill $(cat projects/4-CartographicProjectManager/frontend.pid) || true
          fi
