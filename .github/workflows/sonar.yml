  sonar-cartographic-project-manager:
    name: "Sonar — Cartographic Project Manager"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: projects/4-CartographicProjectManager/package-lock.json

      - name: Install dependencies
        working-directory: projects/4-CartographicProjectManager
        run: npm ci

      - name: Run tests with coverage (threshold override — unit tests are stubs)
        working-directory: projects/4-CartographicProjectManager
        run: npx jest --coverage --coverageThreshold='{}'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
