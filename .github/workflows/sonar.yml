      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: projects/3-MiniBalatro/package-lock.json

      - name: Install dependencies
        working-directory: projects/3-MiniBalatro
        run: npm ci

      - name: Run tests with coverage
        working-directory: projects/3-MiniBalatro
