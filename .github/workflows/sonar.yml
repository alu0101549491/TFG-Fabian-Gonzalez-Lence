name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar-hangman-game:
    name: "Sonar — The Hangman Game"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: projects/1-TheHangmanGame/package-lock.json

      - name: Install dependencies
        working-directory: projects/1-TheHangmanGame
        run: npm ci

      - name: Run tests with coverage
        working-directory: projects/1-TheHangmanGame
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: projects/1-TheHangmanGame
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonar-music-web-player:
    name: "Sonar — Music Web Player"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: projects/2-MusicWebPlayer/package-lock.json

      - name: Install dependencies
        working-directory: projects/2-MusicWebPlayer
        run: npm ci

      - name: Run tests with coverage
        working-directory: projects/2-MusicWebPlayer
