          cache: 'npm'
          cache-dependency-path: projects/5-TennisTournamentManager/package-lock.json

      - name: Install dependencies
        working-directory: projects/5-TennisTournamentManager
        run: npm ci

      - name: Run tests with coverage (threshold override — unit tests are stubs)
        working-directory: projects/5-TennisTournamentManager
        run: npx jest --coverage --coverageThreshold='{}' || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: projects/5-TennisTournamentManager
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
