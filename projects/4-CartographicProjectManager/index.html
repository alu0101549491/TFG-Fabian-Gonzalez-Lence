<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="Cartographic Project Manager - Comprehensive management of cartographic projects with collaboration, task tracking, messaging, and Dropbox integration." />
  <meta name="theme-color" content="#2563EB" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Cartographic Project Manager" />
  <meta property="og:description" content="Web application for comprehensive management of cartographic projects." />
  <meta property="og:type" content="website" />
  
  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Cartographic Project Manager</title>
  <script>
    // GitHub Pages SPA routing: 404.html redirects deep links to /?p=/path.
    // This script reads ?p= and restores the original URL before the app boots.
    (function(l) {
      var params = new URLSearchParams(l.search);
      var p = params.get('p');
      if (p) {
        var q = params.get('q');
        window.history.replaceState(
          null, null,
          l.pathname.replace(/\/$/, '') + p.replace(/~and~/g, '&') +
          (q ? '?' + q.replace(/~and~/g, '&') : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
