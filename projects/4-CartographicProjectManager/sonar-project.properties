# =============================================================
# SonarQube / SonarCloud configuration — Cartographic Project Manager
# Stack: Vue 3 + TypeScript + Vite + Pinia + Socket.io
# =============================================================

sonar.projectKey=cartographic-project-manager
sonar.projectName=Cartographic Project Manager
sonar.organization=alu0101549491
sonar.projectVersion=1.0

# Source & encoding
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Test sources
sonar.tests=tests

# Exclusions (also excludes e2e Playwright tests from source analysis)
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,docs/**,public/**,e2e/**,playwright-report/**,test-results/**

# Test file exclusions from main source analysis
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx,tests/**/*.vue

# Coverage (Jest; run: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
