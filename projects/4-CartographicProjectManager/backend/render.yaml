# Render Blueprint Configuration
# Infrastructure as Code for Cartographic Project Manager Backend
# 
# This file defines a PostgreSQL database and a web service
# Render will automatically set up both when you connect this repository.

services:
  # Backend Web Service
  - type: web
    name: carto-backend
    runtime: node
    region: frankfurt  # Change to your preferred region: oregon, frankfurt, singapore, etc.
    plan: free  # Options: free, starter, standard, pro
    branch: main  # Deploy from main branch
    rootDir: projects/4-CartographicProjectManager/backend
    buildCommand: npm ci && npx prisma generate && npm run build && npm run build:seed
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render's default internal port
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: carto-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true  # Render will generate a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        sync: false  # Set manually in Render dashboard (your GitHub Pages URL)
      - key: SOCKET_CORS_ORIGIN
        sync: false  # Set manually in Render dashboard
      - key: DROPBOX_APP_KEY
        sync: false  # Set manually in Render dashboard
      - key: DROPBOX_APP_SECRET
        sync: false  # Set manually in Render dashboard
      - key: DROPBOX_REFRESH_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: LOG_LEVEL
        value: info
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: SESSION_TIMEOUT_MINUTES
        value: 60

databases:
  # PostgreSQL Database
  - name: carto-db
    databaseName: cartographic_manager
    plan: free  # Free tier: 256 MB RAM, 1 GB storage
    region: frankfurt  # Same region as web service for lower latency
    ipAllowList: []  # Empty = allow from anywhere (needed for Render services)
