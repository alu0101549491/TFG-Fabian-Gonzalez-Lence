# Nixpacks configuration for Railway deployment
[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma migrate deploy && npm run prisma:seed:production && node dist/server.js"

[variables]
NODE_ENV = "production"
