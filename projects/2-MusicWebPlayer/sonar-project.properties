# =============================================================
# SonarQube / SonarCloud configuration — Music Web Player
# Stack: React 18 + TypeScript + Vite
# =============================================================

sonar.projectKey=music-web-player
sonar.projectName=Music Web Player

# Source & encoding
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Test sources
sonar.tests=tests

# Exclusions
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,docs/**,public/**

# Test file exclusions from main source analysis
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx

# Coverage (Jest generates lcov by default; run: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
