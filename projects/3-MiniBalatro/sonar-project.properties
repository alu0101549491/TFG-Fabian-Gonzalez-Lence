# =============================================================
# SonarQube / SonarCloud configuration — Mini Balatro
# Stack: React 18 + TypeScript + Vite (card/roguelike game)
# =============================================================

sonar.projectKey=mini-balatro
sonar.projectName=Mini Balatro
sonar.organization=alu0101549491
sonar.projectVersion=1.0

# Source & encoding
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Test sources
sonar.tests=tests

# Exclusions
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,docs/**,public/**

# Test file exclusions from main source analysis
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx

# Coverage (Jest generates lcov by default; run: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
