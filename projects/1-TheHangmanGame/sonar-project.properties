# =============================================================
# SonarQube / SonarCloud configuration — The Hangman Game
# Stack: Vanilla TypeScript + Vite + Bulma CSS (no framework)
# =============================================================

sonar.projectKey=the-hangman-game
sonar.projectName=The Hangman Game
sonar.organization=alu0101549491
sonar.projectVersion=1.0

# Source & encoding
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Test sources
sonar.tests=tests

# Exclusions
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,docs/**,public/**,deployment/**

# Test file exclusions from main source analysis
sonar.test.inclusions=tests/**/*.ts

# Coverage (Jest generates lcov by default; run: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
