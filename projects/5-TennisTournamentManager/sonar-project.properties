# =============================================================
# SonarQube / SonarCloud configuration — Tennis Tournament Manager
# Stack: Angular 19 + TypeScript + Vite + RxJS + Socket.io
# =============================================================

sonar.projectKey=tennis-tournament-manager
sonar.projectName=Tennis Tournament Manager

# Source & encoding
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript configuration
# tsconfig.app.json covers the Angular application source;
# tsconfig.json is the root that references app/spec/node configs.
sonar.typescript.tsconfigPath=tsconfig.app.json

# Test sources
sonar.tests=tests

# Exclusions (also excludes e2e Playwright tests, backend, and load tests)
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,docs/**,public/**,e2e/**,playwright-report/**,test-results/**,backend/**,load-tests/**,scripts/**

# Test file exclusions from main source analysis
sonar.test.inclusions=tests/**/*.ts

# Coverage (Jest with explicit lcov reporter; run: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
