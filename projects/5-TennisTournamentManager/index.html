<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="%BASE_URL%" />
  <title>Tennis Tournament Manager</title>
  <meta name="description" content="Comprehensive management platform for tennis tournaments – registration, draws, results, and standings." />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
  <script>
    // GitHub Pages SPA routing: 404.html redirects deep links to /?p=/path.
    // This script reads ?p= and restores the original URL before Angular boots.
    (function(l) {
      var params = new URLSearchParams(l.search);
      var p = params.get('p');
      if (p) {
        var q = params.get('q');
        window.history.replaceState(
          null, null,
          l.pathname.replace(/\/$/, '') + p.replace(/~and~/g, '&') +
          (q ? '?' + q.replace(/~and~/g, '&') : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
</head>
<body>
  <app-root></app-root>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
