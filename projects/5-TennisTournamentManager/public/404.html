<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tennis Tournament Manager</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GitHub Pages returns a 404 for a deep link, this page captures
    // the full URL and redirects to index.html with the path encoded as a
    // query parameter, which main index.html then restores via History API.
    var l = window.location;
    var segmentCount = 2; // number of path segments in the repo base (e.g. /TFG-Fabian-Gonzalez-Lence/5-TennisTournamentManager)
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
