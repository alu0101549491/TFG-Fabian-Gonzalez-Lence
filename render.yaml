  #       fromDatabase:
  #         name: tennis-db
  #         property: connectionString
  #     - key: JWT_SECRET
  #       generateValue: true
  #     - key: JWT_REFRESH_SECRET
  #       generateValue: true
  #     - key: JWT_EXPIRES_IN
  #       value: 7d
  #     - key: JWT_REFRESH_EXPIRES_IN
  #       value: 30d
  #     - key: CORS_ORIGIN
  #       sync: false  # Set manually: https://your-username.github.io
  #     - key: SOCKET_CORS_ORIGIN
