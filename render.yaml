# Render Blueprint Configuration - TFG Projects Monorepo
# Infrastructure as Code for multiple backend services
# 
# This blueprint defines:
# - CartographicProjectManager backend + PostgreSQL
# - TennisTournamentManager backend + PostgreSQL (ready for future deployment)
#
# Deploy: https://render.com → New → Blueprint → Select this repo

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CartographicProjectManager Backend
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: carto-backend
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: projects/4-CartographicProjectManager/backend
    buildCommand: npm ci && npx prisma generate && npm run build && npm run build:seed
    startCommand: npx prisma migrate deploy && npm run prisma:seed:production && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: carto-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: SOCKET_CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: DROPBOX_APP_KEY
        sync: false  # Set manually from Dropbox App Console
      - key: DROPBOX_APP_SECRET
        sync: false  # Set manually from Dropbox App Console
      - key: DROPBOX_REFRESH_TOKEN
        sync: false  # Generate with: npm run get-dropbox-token
      - key: SEED_ADMIN_EMAIL
        sync: false  # Set manually: admin email for initial setup
      - key: SEED_ADMIN_PASSWORD
        sync: false  # Set manually: admin password for initial setup
      - key: LOG_LEVEL
        value: info
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: SESSION_TIMEOUT_MINUTES
        value: 60

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TennisTournamentManager Backend (READY FOR FUTURE)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Uncomment when ready to deploy Tennis backend
  # - type: web
  #   name: tennis-backend
  #   runtime: node
  #   region: frankfurt
  #   plan: free
  #   branch: main
  #   rootDir: projects/5-TennisTournamentManager/backend
  #   buildCommand: npm ci && npx prisma generate && npm run build
  #   startCommand: npx prisma migrate deploy && npm start
  #   healthCheckPath: /api/v1/health
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: PORT
  #       value: 10000
  #     - key: API_VERSION
  #       value: v1
