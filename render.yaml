# Render Blueprint Configuration - TFG Projects Monorepo
# Infrastructure as Code for multiple backend services
# 
# This blueprint defines:
# - CartographicProjectManager backend + PostgreSQL
# - TennisTournamentManager backend + PostgreSQL (ready for future deployment)
#
# Deploy: https://render.com → New → Blueprint → Select this repo

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CartographicProjectManager Backend
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: carto-backend
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: projects/4-CartographicProjectManager/backend
    buildCommand: npm ci && npx prisma generate && npm run build && npm run build:seed
    startCommand: npm run prisma:seed:production && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        sync: false  # Set manually: Supabase connection pooler URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: SOCKET_CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: DROPBOX_APP_KEY
        sync: false  # Set manually from Dropbox App Console
      - key: DROPBOX_APP_SECRET
        sync: false  # Set manually from Dropbox App Console
      - key: DROPBOX_REFRESH_TOKEN
        sync: false  # Generate with: npm run get-dropbox-token
      - key: SEED_ADMIN_EMAIL
        sync: false  # Set manually: admin email for initial setup
      - key: SEED_ADMIN_PASSWORD
        sync: false  # Set manually: admin password for initial setup
      - key: LOG_LEVEL
        value: info
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: SESSION_TIMEOUT_MINUTES
        value: 60

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TennisTournamentManager Backend
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: tennis-backend
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: projects/5-TennisTournamentManager/backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        sync: false  # Set manually: Supabase connection string (Session pooler)
      - key: DB_SYNCHRONIZE
        value: false
      - key: DB_LOGGING
        value: false
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: SOCKET_CORS_ORIGIN
        sync: false  # Set manually: https://your-username.github.io
      - key: APP_URL
        sync: false  # Set manually: https://your-username.github.io
      - key: EMAIL_HOST
        sync: false  # Set manually: smtp.gmail.com or smtp.sendgrid.net
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false  # Set manually
      - key: EMAIL_PASSWORD
        sync: false  # Set manually (Gmail App Password or SendGrid API Key)
      - key: EMAIL_FROM_NAME
        value: Tennis Tournament Manager
      - key: EMAIL_FROM_ADDRESS
        sync: false  # Set manually
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Optional: Set if using Telegram notifications
      - key: TELEGRAM_ENABLED
        value: false
      - key: WEB_PUSH_PUBLIC_KEY
        sync: false  # Optional: Generate with npx web-push generate-vapid-keys
      - key: WEB_PUSH_PRIVATE_KEY
        sync: false  # Optional
      - key: WEB_PUSH_SUBJECT
        sync: false  # Optional: mailto:your-email@example.com
      - key: WEB_PUSH_ENABLED
        value: false
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: SESSION_TIMEOUT_MINUTES
        value: 60

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DATABASES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Both CARTO and TENNIS use Supabase (external managed PostgreSQL)
# No Render databases needed - DATABASE_URL set manually in each service

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEPLOYMENT NOTES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# MONOREPO SETUP:
# This Blueprint manages multiple backends in a single repository.
# Each service has its own rootDir pointing to its backend folder.
#
# CURRENT DEPLOYMENT:
# - carto-backend + carto-db (CartographicProjectManager)
# - tennis-backend + tennis-db (TennisTournamentManager)
#
# FREE TIER LIMITS:
# - Render FREE allows multiple services
# - Each service: 750h/month (can run 1 service 24/7 or 2 services 12h/day each)
# - Each database: 1 GB storage, 90 days retention
# - Careful: Multiple always-on services will consume the 750h quickly
#
# COST OPTIMIZATION:
# - Keep only actively used services deployed
# - FREE tier = services sleep after 15 min inactivity
# - For development: Deploy one at a time as needed
# - For production: Upgrade to Starter ($7/month per service)
#
# MANUAL ENVIRONMENT VARIABLES (Set in Render Dashboard):
# 
# Both backends require:
# - CORS_ORIGIN (your GitHub Pages URL)
# - SOCKET_CORS_ORIGIN (your GitHub Pages URL)
# 
# Carto backend also requires:
# - DROPBOX_APP_KEY, DROPBOX_APP_SECRET, DROPBOX_REFRESH_TOKEN
#   See: projects/4-CartographicProjectManager/backend/RENDER.md
#
# Tennis backend also requires:
# - APP_URL (your GitHub Pages URL)
# - EMAIL_HOST, EMAIL_USER, EMAIL_PASSWORD, EMAIL_FROM_ADDRESS
# - Optional: TELEGRAM_BOT_TOKEN, WEB_PUSH_PUBLIC_KEY, WEB_PUSH_PRIVATE_KEY
#   See: projects/5-TennisTournamentManager/backend/RENDER.md
#
# DEPLOYMENT:
# 1. Push to main branch
# 2. Render Dashboard → New → Blueprint
# 3. Select repository → Apply
# 4. Configure manual environment variables for each service
#
# See project-specific RENDER.md files for detailed setup instructions.

