databases:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CartographicProjectManager Database
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: carto-db
    databaseName: cartographic_manager
    plan: free  # 256 MB RAM, 1 GB storage, 90 days retention
    region: frankfurt
    ipAllowList: []  # Empty = allow from anywhere (needed for Render services)

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TennisTournamentManager Database (READY FOR FUTURE)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Uncomment when ready to deploy Tennis backend
  # - name: tennis-db
  #   databaseName: tennis_tournament_manager
  #   plan: free
  #   region: frankfurt
  #   ipAllowList: []

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEPLOYMENT NOTES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# MONOREPO SETUP:
# This Blueprint manages multiple backends in a single repository.
# Each service has its own rootDir pointing to its backend folder.
#
# DEPLOYING CARTO ONLY (CURRENT):
# - Only carto-backend and carto-db will be created
# - Tennis service is commented out and won't be deployed
#
# DEPLOYING BOTH BACKENDS (FUTURE):
# 1. Uncomment tennis-backend and tennis-db sections above
# 2. Push to main branch
# 3. Render will automatically create both services
# 4. Configure CORS_ORIGIN for tennis-backend in Render Dashboard
#
# FREE TIER LIMITS:
# - Render FREE allows multiple services
# - Each service: 750h/month (can run 1 service 24/7 or 2 services 12h/day each)
# - Each database: 1 GB storage, 90 days retention
# - Careful: Multiple always-on services will consume the 750h quickly
#
# COST OPTIMIZATION:
# - Keep only actively used services deployed
# - FREE tier = services sleep after 15 min inactivity
# - For development: Deploy one at a time as needed
# - For production: Upgrade to Starter ($7/month per service)
#
# MANUAL ENVIRONMENT VARIABLES (Set in Render Dashboard):
# Both backends require:
# - CORS_ORIGIN (your GitHub Pages URL)
# - SOCKET_CORS_ORIGIN (your GitHub Pages URL)
# 
# Carto backend also requires:
# - DROPBOX_APP_KEY
# - DROPBOX_APP_SECRET
# - DROPBOX_REFRESH_TOKEN
#
# See: projects/4-CartographicProjectManager/backend/RENDER.md
